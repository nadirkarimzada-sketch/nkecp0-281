<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <include id="header" src="../../components/header/header-component.html"></include>

    <div class="content h-screen flex items-center justify-center px-4 m-3">
        <div class="w-full h-full border">
            <div class="h-[70%] p-4 w-full">
                <h2 class="text-x font-bold">Cart</h2>
                <table class="w-full text-left">
                        <tr class="px-3 py-2 bg-gray-300">
                            <th class="px-3 py-2 border">Product</th>
                            <th class="px-3 py-2 border">Price</th>
                            <th class="px-3 py-2 border">Quantity</th>
                            <th class="px-3 py-2 border">Subtotal</th>
                            <th class="px-3 py-2 border">Action</th>
                        </tr>

                        <tr>
                            <td class="px-3 py-2 border"><img src="" alt=""></td>
                            <td class="px-3 py-2 border">999999999999999999999999.99$</td>
                            <td class="px-3 py-2 border">
                                <select class="bg-white px-3 py-2 rounded-lg" name="" id="">
                                    <option value="">1</option>
                                </select>
                            </td>
                            <td class="px-3 py-2 border">999999999999999999999999.99</td>
                            <td class="px-3 py-2 border">
                                <button class="text-white hover:bg-red-600 px-3 py-2 rounded-lg">Remove</button>
                            </td>
                        </tr>
                        <tr>
                            <td class="px-3 py-2 border"><img src="" alt=""></td>
                            <td class="px-3 py-2 border">999999999999999999999999.99$</td>
                            <td class="px-3 py-2 border">
                                <select class="bg-white px-3 py-2 rounded-lg" name="" id="">
                                    <option value="">1</option>
                                </select>
                            </td>
                            <td class="px-3 py-2 border">999999999999999999999999.99</td>
                            <td class="px-3 py-2 border">
                                <button class="text-white bg-red-500 hover:bg-red-600 px-3 py-2 rounded-lg">Remove</button>
                            </td>
                        </tr>
                </table>
            </div>

            <div class="h-[30%] flex justify-end">
                <div class="h-full w-[500px] border-2 space-y-2 p-4">
                    <h2 class="text-2xl font-medium">Cart Total</h2>
                    <p class="flex justify-between text-xl py-4">
                        <span>Subtotal</span>
                        <span>999999999999999999999999.99$</span>
                    </p>
                    <hr>
                    <p class="flex justify-between text-xl py-4">
                        <span>Shipping</span>
                        <span>free</span>
                    </p>
                    <hr>
                    <p class="flex justify-between text-xl py-4">
                        <span>Total</span>
                        <span>1000000000000000000000000.00$</span>
                    </p>

                    <button class="cursor-pointer bg-red-500 hover:bg-red-600 rounded-xl px-3 py-1 text-white text-xl h-[40px]
                    w-full">Procces to Checkout</button>
                </div>
            </div>
        </div>
    </div>

    <include id="footer" src="../../components/footer/footer-component.html"></include>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script type="module" src="../../utils/includes.js"></script>
</body>
</html>
